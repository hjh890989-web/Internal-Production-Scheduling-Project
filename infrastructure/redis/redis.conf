# =============================================================================
# Redis 7 — Internal Production Scheduling
# =============================================================================
# 용도 (SAD §6.2):
#   1. Spring Session 세션 저장 (NGINX 뒤 다중 BE 인스턴스 대비)
#   2. Caffeine L1 캐시 보완 — 슬롯 O/X 매트릭스 · v_product_with_spec 등
#   3. Pub/Sub WebSocket 백업 경로 (NFR-PER-004 — PG LISTEN/NOTIFY 다중 인스턴스 한계 대비)
# =============================================================================

# ---------- Network ----------
bind 0.0.0.0
protected-mode yes
port 6379
timeout 300                      # idle 5분 후 자동 종료
tcp-keepalive 60

# ---------- 영속성 (AOF — RPO 1초, NFR-REL-002) ----------
appendonly yes
appendfsync everysec             # 1초 단위 fsync — 성능·내구성 균형
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB 스냅샷 (보조)
save 3600 1                      # 1시간에 1번 이상 쓰기 시
save 300 100
save 60 10000

# ---------- Memory ----------
maxmemory 1gb                    # 잉여 서버 8 GB 의 1/8 (NFR-COS-001)
maxmemory-policy allkeys-lru     # 메모리 부족 시 LRU eviction

# ---------- Pub/Sub Keyspace Notifications (NFR-PER-004) ----------
notify-keyspace-events KEA       # keyspace events 전체 (cache invalidation 자동화)

# ---------- Slowlog (NFR-OPS-001) ----------
slowlog-log-slower-than 10000    # 10ms 초과 명령
slowlog-max-len 128

# ---------- Logging ----------
loglevel notice
logfile ""                       # stderr → docker logs

# ---------- Security ----------
# requirepass 는 docker-compose command line 에서 --requirepass 로 주입
# rename-command FLUSHDB ""      # PROD 활성 (실수 방지)
# rename-command FLUSHALL ""
