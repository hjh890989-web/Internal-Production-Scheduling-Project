# =============================================================================
# Redis 7 — Internal Production Scheduling
# =============================================================================
# 용도 (SAD §6.2):
#   1. Spring Session 세션 저장 (NGINX 뒤 다중 BE 인스턴스 대비)
#   2. Caffeine L1 캐시 보완 — 슬롯 O/X 매트릭스 · v_product_with_spec 등
#   3. Pub/Sub WebSocket 백업 경로 (NFR-PER-004 — PG LISTEN/NOTIFY 다중 인스턴스 한계 대비)
#
# ※ Redis config 는 inline 주석 미지원. 모든 주석은 별도 줄에만.
# =============================================================================

# ---------- Network ----------
bind 0.0.0.0
protected-mode yes
port 6379
# idle 5분 후 자동 종료
timeout 300
tcp-keepalive 60

# ---------- 영속성 (AOF — RPO 1초, NFR-REL-002) ----------
appendonly yes
# 1초 단위 fsync — 성능·내구성 균형
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB 스냅샷 (보조)
# 1시간에 1번 이상 쓰기 시
save 3600 1
save 300 100
save 60 10000

# ---------- Memory ----------
# 잉여 서버 8 GB 의 1/8 (NFR-COS-001)
maxmemory 1gb
# 메모리 부족 시 LRU eviction
maxmemory-policy allkeys-lru

# ---------- Pub/Sub Keyspace Notifications (NFR-PER-004) ----------
# keyspace events 전체 (cache invalidation 자동화)
notify-keyspace-events KEA

# ---------- Slowlog (NFR-OPS-001) ----------
# 10ms 초과 명령
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---------- Logging ----------
loglevel notice
# stderr → docker logs
logfile ""

# ---------- Security ----------
# requirepass 는 docker-compose command line 에서 --requirepass 로 주입.
# PROD 활성 (실수 방지): rename-command FLUSHDB "" / rename-command FLUSHALL ""
