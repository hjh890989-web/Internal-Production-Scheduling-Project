# =============================================================================
# pg_hba.conf — Scheduling System (TK-33-2-1)
# =============================================================================
# 기본 postgres image hba 에 replication 항목 추가.
# DEV: scheduling-net (172.18.0.0/16) 내부 트래픽만 허용.
# PROD: 사내 CIDR 로 좁힘.
# =============================================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# 로컬 unix socket — postgres 슈퍼유저 trust (컨테이너 내부)
local   all             all                                     trust

# 컨테이너 네트워크 — 일반 DB 접속 (scram-sha-256 인증)
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256
host    all             all             samenet                 scram-sha-256

# Replication — pg_basebackup 전용 (TK-33-2-1)
# DEV: scheduling-net 전체. PROD: 사내 CIDR /24 로 좁힘.
host    replication     backup_user     samenet                 scram-sha-256
