# =============================================================================
# PostgreSQL 16 — Internal Production Scheduling
# =============================================================================
# 호스트 가정: 8 GB RAM (잉여 사내 서버), Linux/WSL2.
# 부하 가정: 30명 동시 named user (NFR-COM-001) + 1500 row × 30 col 1주 horizon.
# 후속 튜닝은 Phase 1.0 부하 테스트 결과 후 (k6 — TK-40-1-3).
# =============================================================================

# ---------- Connection ----------
listen_addresses = '*'
max_connections  = 100                  # NFR-COM-001 (30 동시 + 여유 + admin)
hba_file         = '/etc/postgresql/pg_hba.conf'   # TK-33-2-1 replication 항목 포함

# ---------- Memory ----------
shared_buffers       = 512MB            # ≈ 가용 메모리의 25%
effective_cache_size = 2GB
work_mem             = 16MB
maintenance_work_mem = 128MB

# ---------- WAL & 백업 (TK-33-2-2 / NFR-REL-005 RPO ≤24h, 실측 ≤5분) ----------
wal_level                = replica
archive_mode             = on
archive_command          = 'sh /usr/local/bin/archive-wal.sh %p %f'
archive_timeout          = 300              # 5분마다 WAL switch 강제 (RPO 단축)
max_wal_size             = 2GB
min_wal_size             = 256MB
checkpoint_timeout       = 15min
checkpoint_completion_target = 0.9

# ---------- Replication / pg_basebackup (TK-33-2-1·2) ----------
max_wal_senders          = 3                # pg_basebackup --wal-method=stream 필요
wal_keep_size            = 1GB

# ---------- Logging (NFR-OPS-001) ----------
log_destination          = 'stderr'
logging_collector        = off              # Docker stdout/stderr 직접
log_min_duration_statement = 1000           # 1초 초과 쿼리 (slow query 추적)
log_statement            = 'mod'            # DML (UPDATE·DELETE·INSERT) 로깅
log_connections          = on
log_disconnections       = on
log_line_prefix          = '%t [%p] %u@%d '
log_timezone             = 'Asia/Seoul'

# ---------- Locale & Timezone (BR-X04) ----------
timezone                 = 'Asia/Seoul'
datestyle                = 'iso, ymd'
lc_messages              = 'C'
lc_monetary              = 'ko_KR.UTF-8'
lc_numeric               = 'ko_KR.UTF-8'
lc_time                  = 'ko_KR.UTF-8'

# ---------- Autovacuum ----------
autovacuum                = on
autovacuum_naptime        = 60s
autovacuum_vacuum_threshold     = 50
autovacuum_analyze_threshold    = 50

# ---------- Misc ----------
default_text_search_config = 'pg_catalog.simple'
