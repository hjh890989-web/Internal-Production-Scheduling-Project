# =============================================================================
# Promtail 3.0 config (TK-31-2-1)
# =============================================================================
# Docker socket 기반 자동 컨테이너 발견 + JSON 로그 parsing.
# Spring Boot logback 은 JSON encoder 활성 후 (TK-44-1-1) 구조화 로그 추출.
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ---------------------------------------------------------------------------
  # Docker 자동 발견 — scheduling-net 네트워크 컨테이너 전부
  # ---------------------------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: network
            values: [scheduling-net]
    relabel_configs:
      # 컨테이너 이름 → service label (scheduling-backend → backend)
      - source_labels: ['__meta_docker_container_name']
        regex: '/scheduling-(.+)'
        target_label: 'service'
      # compose 서비스 라벨 → module
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'module'
      # log stream (stdout / stderr) 보존
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      # Spring Boot JSON 로그 시도 — TK-44-1-1 logback JSON encoder 후 활성
      - match:
          selector: '{service="backend"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger
                  thread: thread
                  trace_id: traceId
                  span_id: spanId
            - labels:
                level:
                trace_id:
            - timestamp:
                source: timestamp
                format: RFC3339Nano
                fallback_formats:
                  - RFC3339
                  - "2006-01-02 15:04:05.000"
