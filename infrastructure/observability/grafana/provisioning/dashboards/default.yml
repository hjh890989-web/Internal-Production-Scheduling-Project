# =============================================================================
# Grafana dashboard auto-provisioning (TK-31-1-3)
# =============================================================================
# /var/lib/grafana/dashboards 폴더의 *.json 자동 import.
# foldersFromFilesStructure: false → 단일 폴더 (대시보드 < 10 건 단계).
# =============================================================================

apiVersion: 1

providers:
  - name: 'scheduling-default'
    orgId: 1
    folder: 'Scheduling System'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
