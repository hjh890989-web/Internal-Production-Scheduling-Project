# =============================================================================
# Grafana datasource provisioning (TK-31-1-3 + TK-31-2-2)
# =============================================================================
# Prometheus = 활성 (TK-31-1-2).
# Loki      = 활성 (TK-31-2-1) + Spring Boot traceId → Tempo span jump (derivedFields).
# Tempo     = 자리 — TK-44-5-3 (Sprint 1+ APM 통합) 후 활성.
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo

  - name: Loki
    type: loki
    access: proxy
    uid: loki
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      # Spring Boot JSON 로그의 traceId → Tempo span 으로 점프 (Explore tab)
      derivedFields:
        - name: TraceID
          matcherRegex: '"traceId":"(\w+)"'
          url: '${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: 'View in Tempo'

  # Tempo — TK-44-5-3 (Sprint 1+ OpenTelemetry agent) 후 본격 활성.
  # 현재는 datasource 자리만 — Loki derivedFields 가 참조 가능하도록.
  - name: Tempo
    type: tempo
    access: proxy
    uid: tempo
    url: http://tempo:3200
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        tags: [{ key: 'service.name', value: 'service' }]
        filterByTraceID: true
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: prometheus
