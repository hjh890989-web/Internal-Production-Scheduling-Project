# =============================================================================
# AlertManager 0.27 config (TK-31-2-3)
# =============================================================================
# SRS OPS-003: Critical 60초 SLA → group_wait: 0s + repeat 15m
#              Warning      → group_wait: 10s + repeat 1h
#
# AlertManager 는 YAML env var 치환을 지원하지 않으므로 placeholder URL 사용.
# DEV: 아래 placeholder = HTTP 404 → alert 발화는 정상, Slack 미발송 (로그만).
# STG/PROD: 배포 시 envsubst 또는 secret manager 가 실 URL 로 치환.
# 참고: secrets-management.md §3.5 분기 audit.
# =============================================================================

global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/PLACEHOLDER/DEV/no-real-webhook'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: slack-warning              # default fallback
  group_by: ['alertname', 'severity', 'service']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h

  routes:
    # ---------- CRITICAL — 60초 SLA (OPS-003) ----------
    - matchers:
        - severity = "critical"
      receiver: slack-critical
      group_wait: 0s                    # 즉시 발송
      group_interval: 30s
      repeat_interval: 15m              # 미해결 시 15분마다 재발송

    # ---------- WARNING — 영업시간만 (noise 절감) ----------
    - matchers:
        - severity = "warning"
      receiver: slack-warning
      group_wait: 30s
      repeat_interval: 4h

inhibit_rules:
  # critical 이 발화하면 동일 alertname 의 warning 은 억제
  - source_matchers: [severity = "critical"]
    target_matchers: [severity = "warning"]
    equal: ['alertname', 'service']

receivers:
  - name: slack-critical
    slack_configs:
      - channel: '#scheduling-alerts'
        send_resolved: true
        title: ':rotating_light: CRITICAL — {{ .GroupLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Service*: {{ .Labels.service }}
          *Summary*: {{ .Annotations.summary }}
          *Runbook*: {{ .Annotations.runbook }}
          *Started*: {{ .StartsAt.Format "2006-01-02 15:04:05 KST" }}
          {{ end }}

  - name: slack-warning
    slack_configs:
      - channel: '#scheduling-warnings'
        send_resolved: true
        title: ':warning: {{ .GroupLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Service*: {{ .Labels.service }}
          *Summary*: {{ .Annotations.summary }}
          {{ end }}
