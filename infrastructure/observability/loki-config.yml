# =============================================================================
# Loki 3.0 config (TK-31-2-1)
# =============================================================================
# 단일 인스턴스 모드 (filesystem 저장).
# Phase 2+: S3 호환 NAS 검토 (사내망 — 클라우드 금지).
# Retention 90일 = 2160h (NFR-OPS-001).
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: warn

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

limits_config:
  retention_period: 2160h           # 90일 — NFR-OPS-001
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_query_length: 721h            # 30일 + 여유 (Grafana Explore)
  max_query_parallelism: 32
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # 7일

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-shipper-active
    cache_location: /loki/tsdb-shipper-cache
  filesystem:
    directory: /loki/chunks

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true

analytics:
  reporting_enabled: false
