# =============================================================================
# scheduling.conf — STG (stg.scheduling.internal)
# =============================================================================
# DEV scheduling.conf 와 동일 구조 + STG 차이점:
#   - server_name = stg.scheduling.internal (default_server 제거)
#   - actuator endpoint 베타 사용자 표시 (X-Env-Stg 헤더)
#   - backend upstream = single (Blue-Green 아님, STG 자원 절약)
# =============================================================================

upstream backend {
    server backend:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80 default_server;
    server_name _;

    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 — STG 도메인
server {
    listen 443 ssl default_server;
    http2 on;
    server_name stg.scheduling.internal;

    ssl_certificate     /etc/nginx/ssl/scheduling.crt;
    ssl_certificate_key /etc/nginx/ssl/scheduling.key;

    # STG 환경 표시 헤더 (베타 사용자에게 환경 인지)
    add_header X-Env-Stg "true" always;

    location = /health {
        access_log off;
        return 200 "OK (STG)\n";
        add_header Content-Type text/plain;
    }

    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    location /actuator/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        # STG 는 사내 IP whitelist (베타 사용자 한정):
        # allow 10.0.0.0/8;
        # deny  all;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
}
