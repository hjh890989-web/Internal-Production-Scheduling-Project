# =============================================================================
# NGINX 1.25 — Internal Production Scheduling
# =============================================================================
# 역할:
#   1. TLS termination (TLS 1.2/1.3 + HSTS 1년) — NFR-SEC-006
#   2. 리버스 프록시 — Backend Spring Boot /api/*, /ws/*
#   3. WebSocket proxy — STOMP /ws p95 ≤2초 (NFR-PER-004)
#   4. 정적 파일 서빙 — Frontend React SPA (NFR-PER-005 p95 ≤1초)
# =============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- Logging (NFR-OPS-001) ----------
    log_format main '$remote_addr - $remote_user [$time_iso8601] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ---------- Performance ----------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20m;          # Excel 업로드 한도 (SAD-RSK-005)

    # ---------- gzip (NFR-PER-005 UI 응답) ----------
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/plain
               text/css
               text/xml
               application/json
               application/javascript
               application/xml
               application/xml+rss
               image/svg+xml;

    # ---------- TLS 글로벌 (NFR-SEC-006) ----------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ---------- 보안 헤더 (NFR-SEC-006 HSTS + clickjacking + XSS) ----------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options          "DENY"        always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    include /etc/nginx/conf.d/*.conf;
}
