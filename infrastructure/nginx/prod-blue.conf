# =============================================================================
# scheduling.conf — PROD Blue (backend-blue active)
# =============================================================================
# 배포 절차: bash infrastructure/scripts/blue-green-switch.sh blue
#   → prod-active.conf 가 prod-blue.conf 를 가리킴 (symlink 또는 cp)
#   → nginx reload → backend-blue 로 traffic switch
# =============================================================================

upstream backend {
    server backend-blue:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP → HTTPS 리다이렉트 + /health (compose healthcheck)
server {
    listen 80 default_server;
    server_name _;
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/scheduling.crt;
    ssl_certificate_key /etc/nginx/ssl/scheduling.key;

    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    location /actuator/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        # 사내망 only — PROD 는 사내 IP whitelist allow/deny 추가:
        # allow 10.0.0.0/8;
        # deny  all;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
}
