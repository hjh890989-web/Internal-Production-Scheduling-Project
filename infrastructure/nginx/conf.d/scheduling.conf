# =============================================================================
# scheduling.conf — 사이트 설정
# =============================================================================
# Backend upstream + HTTPS 메인 + HTTP→HTTPS 리다이렉트.
# Backend (Spring Boot) 서비스는 TK-00-1-4 에서 docker-compose 에 추가됨.
# 본 Task 단독 부팅 시 backend upstream은 unreachable — 외부 진입(/health)만 동작.
# =============================================================================

# ---------- Backend upstream ----------
upstream backend {
    server backend:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ---------- HTTP → HTTPS 리다이렉트 ----------
server {
    listen 80 default_server;
    server_name _;

    # NGINX healthcheck endpoint (compose healthcheck용 — HTTPS 아닌 평문)
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # 그 외 모두 HTTPS 리다이렉트 (NFR-SEC-006)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS 메인 ----------
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    # TLS 인증서 (DEV: 자체 서명, STG/PROD: 사내 CA)
    ssl_certificate     /etc/nginx/ssl/dev-self-signed.crt;
    ssl_certificate_key /etc/nginx/ssl/dev-self-signed.key;

    # Healthcheck
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ---------- WebSocket (NFR-PER-004 p95 ≤2초) ----------
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;          # WebSocket long-lived
        proxy_send_timeout 3600s;
    }

    # ---------- REST API ----------
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;         # NFR-PER-001 (1만 row 60초 한도)
        proxy_send_timeout    60s;
    }

    # ---------- Actuator (사내망 헬스체크 — Prometheus scrape는 EP-31) ----------
    location /actuator/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        # 사내망 only — 사내 IP whitelist 는 STG/PROD에서 allow/deny 추가
    }

    # ---------- Frontend SPA (정적 파일 + React Router fallback) ----------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA 새로고침 404 방지
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
}
