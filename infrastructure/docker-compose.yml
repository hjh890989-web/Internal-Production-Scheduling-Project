# =============================================================================
# Internal Production Scheduling — Docker Compose (Sprint 0 ST-00-1)
# =============================================================================
# 서비스:
#   postgres : PostgreSQL 16-alpine (TK-00-1-1) — app·audit·master 3 schema
#   redis    : Redis 7-alpine        (TK-00-1-2) — 세션 + 캐시 + Pub/Sub
#   nginx    : NGINX 1.25-alpine     (TK-00-1-3) — TLS termination + reverse proxy + WebSocket
#
# 통합 검증 (TK-00-1-4 — backend·frontend 추가):
#   - backend  (Spring Boot 3.5.14 — ST-00-2 산출물, TK-00-1-4 에서 활성)
#   - frontend (React SPA — ST-00-3 산출물, 정적 파일로 NGINX 서빙)
#
# DEV 가정: 모든 ports 127.0.0.1 바인딩 (NFR-SEC-001 사내망 전용 추가 가드).
# STG/PROD: 사내 IP whitelist + 사내 CA 인증서 (ports 변경, docker-compose.staging.yml).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 (TK-00-1-1)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: scheduling-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scheduling}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?password 필수 — .env에서 설정}
      TZ: Asia/Seoul                  # BR-X04
      PGTZ: Asia/Seoul
    ports:
      - "127.0.0.1:5432:5432"         # DEV: localhost only
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-scheduling}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # Redis 7 (TK-00-1-2)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: scheduling-redis
    command:
      - redis-server
      - /etc/redis/redis.conf
      - --requirepass
      - ${REDIS_PASSWORD:?password 필수 — .env에서 설정}
    ports:
      - "127.0.0.1:6379:6379"         # DEV: localhost only
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # NGINX 1.25 (TK-00-1-3)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: scheduling-nginx
    ports:
      - "127.0.0.1:80:80"             # DEV: localhost only (HTTP → HTTPS 리다이렉트)
      - "127.0.0.1:443:443"           # DEV: localhost only (HTTPS)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend-static:/usr/share/nginx/html:ro   # Frontend 빌드 산출물 (ST-00-3)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    # backend 서비스 (ST-00-2 / TK-00-1-4) 추가 후 depends_on 활성:
    # depends_on:
    #   backend:
    #     condition: service_healthy
    restart: unless-stopped
    networks:
      - scheduling-net

# =============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  frontend-static:
    driver: local

networks:
  scheduling-net:
    driver: bridge
