# =============================================================================
# Internal Production Scheduling — Docker Compose (Sprint 0 ST-00-1 통합 완성)
# =============================================================================
# 5 서비스 (TK-00-1-4 Sprint 0 DoD 항목 1):
#   postgres : PostgreSQL 16-alpine        (TK-00-1-1) — app·audit·master 3 schema
#   redis    : Redis 7-alpine              (TK-00-1-2) — 세션 + 캐시 + Pub/Sub
#   backend  : Spring Boot 3.5.14 jar      (TK-00-2-1) — 7 모듈 합성 app
#   frontend : node 빌드 + NGINX serve     (TK-00-3-1) — React SPA, dist→volume
#   nginx    : NGINX 1.25-alpine           (TK-00-1-3) — TLS + reverse proxy + WS
#
# 부팅 순서 (depends_on + service_healthy — Compose v2):
#   postgres·redis  →  backend  →  nginx
#   frontend (독립, NGINX healthcheck 대기로 nginx도 frontend 대기)
#
# DEV 가정: 모든 ports 127.0.0.1 바인딩 (NFR-SEC-001 사내망 전용 추가 가드).
# STG/PROD: 사내 IP whitelist + 사내 CA 인증서 (ports 변경, docker-compose.staging.yml).
# =============================================================================

name: scheduling

services:
  # ---------------------------------------------------------------------------
  # 1. PostgreSQL 16 (TK-00-1-1)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: scheduling-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scheduling}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?password 필수 — .env에서 설정}
      TZ: Asia/Seoul                  # BR-X04
      PGTZ: Asia/Seoul
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-scheduling}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # 2. Redis 7 (TK-00-1-2)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: scheduling-redis
    command:
      - redis-server
      - /etc/redis/redis.conf
      - --requirepass
      - ${REDIS_PASSWORD:?password 필수 — .env에서 설정}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # 3. Backend (Spring Boot 3.5.14 + Modulith 1.4.11 — TK-00-2-1)
  # ---------------------------------------------------------------------------
  # backend/ 디렉토리의 Dockerfile (multi-stage: JDK 21 builder → JRE 21 alpine)
  # 본 Task 단계: app/application.yml 의 'default' profile (PG/Redis auto-config exclude)
  #              → 컨테이너 부팅 성공, /actuator/health/liveness 200 OK
  # Sprint 1+: 'with-infra' profile 활성 + Flyway 마이그레이션 → PG 연결
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: scheduling-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx2g}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-scheduling}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: Asia/Seoul
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health/liveness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s          # JVM 부팅 여유 (Spring Boot 30~45s)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # 4. Frontend (React SPA dist → frontend-static volume — TK-00-3-1)
  # ---------------------------------------------------------------------------
  # frontend/Dockerfile (multi-stage: node:20 builder → nginx:1.25 serve).
  # 본 컨테이너는 자체 NGINX로 serve 가능하지만, scheduling-nginx 가 frontend-static
  # volume 을 통해 정적 파일을 직접 서빙 → 본 컨테이너 healthcheck 통과 후 nginx 시작.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: scheduling-frontend
    volumes:
      - frontend-static:/usr/share/nginx/html
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # 5. Keycloak DB (TK-30-1-1) — Keycloak 전용 PostgreSQL (운영 PG와 분리)
  # ---------------------------------------------------------------------------
  keycloak-db:
    image: postgres:16-alpine
    container_name: scheduling-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?password 필수 — .env에서 설정}
      TZ: Asia/Seoul
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # 6. Keycloak 24 LTS (TK-30-1-1) — SSO + OIDC + RBAC (PLANNER·STK_USER·IT_OPS·READ_ONLY)
  # ---------------------------------------------------------------------------
  # production 'start' 모드 + KC_PROXY=edge (NGINX 뒤에서 TLS termination).
  # realm-scheduling-system.json 자동 import (--import-realm 옵션).
  # DEV host port 8180 — backend 8080 과 충돌 회피.
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: scheduling-keycloak
    command: ["start", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOST:-localhost}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?password 필수 — .env에서 설정}
      TZ: Asia/Seoul
    volumes:
      - ./keycloak/realm-scheduling-system.json:/opt/keycloak/data/import/realm-scheduling-system.json:ro
    ports:
      - "127.0.0.1:8180:8080"     # DEV admin console + OIDC endpoint
    expose:
      - "8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      # Keycloak 24 는 health endpoint도 8080 port (25+ 부터 9000 분리).
      # 이미지에 curl/wget 없어 bash /dev/tcp + grep 으로 200 OK 확인.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s           # realm import + JVM 부팅 여유
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # 7. Prometheus 2.52 (TK-31-1-2) — metric scrape + 30일 retention
  # ---------------------------------------------------------------------------
  # scheduling-backend `/actuator/prometheus` + postgres-exporter + keycloak scrape.
  # 30일 보존 (`--storage.tsdb.retention.time=30d`) + persistent volume.
  # DEV host port 9090 — admin UI.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: scheduling-prometheus
    user: "65534:65534"               # nobody — TSDB write 권한
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # 8. postgres-exporter (TK-31-1-2) — PostgreSQL metric for Prometheus
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: scheduling-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-scheduling}?sslmode=disable"
      TZ: Asia/Seoul
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9187/metrics | grep -q 'pg_up 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # 9. Loki 3.0 (TK-31-2-1) — 로그 집계 + 90일 retention (NFR-OPS-001)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    container_name: scheduling-loki
    user: "10001:10001"                 # loki uid
    command: -config.file=/etc/loki/local-config.yml
    expose:
      - "3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # 10. Promtail 3.0 (TK-31-2-1) — Docker socket 자동 발견 → Loki push
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.0.0
    container_name: scheduling-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - promtail-data:/tmp
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # 11. AlertManager 0.27 (TK-31-2-3) — Prometheus alert → Slack webhook
  # ---------------------------------------------------------------------------
  # Critical 60초 SLA (OPS-003): group_wait=0s + repeat 15m
  # DEV 에서는 SLACK_WEBHOOK_URL 빈값 — alert 발화 정상이지만 Slack 발송은 NOOP.
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: scheduling-alertmanager
    user: "65534:65534"
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      TZ: Asia/Seoul
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # 12. Grafana 10.4 (TK-31-1-3) — 17 KPI 대시보드 + datasource provisioning
  # ---------------------------------------------------------------------------
  # DEV 인증: admin / admin (변경 안 함 — first login 강제 비활성).
  # Keycloak SSO 통합은 ST-30-2 (Sprint 1) Keycloak client 추가 후 활성.
  # provisioning 으로 Prometheus datasource + 3 대시보드 자동 import.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: scheduling-grafana
    user: "472:0"                       # grafana uid + root group (volume 권한)
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_LOG_LEVEL: warn
      GF_FEATURE_TOGGLES_ENABLE: nestedFolders
      TZ: Asia/Seoul                    # BR-X04
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"database\": \"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - scheduling-net

  # ---------------------------------------------------------------------------
  # 13. NGINX 1.25 (TK-00-1-3) — TLS + reverse proxy + WebSocket + 정적 서빙
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: scheduling-nginx
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend-static:/usr/share/nginx/html:ro
    healthcheck:
      # BusyBox wget 가 localhost → IPv6 우선 → nginx IPv4 only → fail.
      # 127.0.0.1 명시로 IPv4 강제 (frontend도 동일 패턴).
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scheduling-net

# =============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  frontend-static:
    driver: local
  keycloak-db-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  promtail-data:
    driver: local
  alertmanager-data:
    driver: local

networks:
  scheduling-net:
    driver: bridge
    name: scheduling-net
