# =============================================================================
# Frontend SonarQube 프로젝트 설정 — TK-32-2-2
# =============================================================================
# Jenkinsfile.frontend 의 'SonarQube Analysis' stage 에서 'sonar-scanner' 실행 시 참조.
# =============================================================================

sonar.projectKey=scheduling-frontend
sonar.projectName=Scheduling Frontend
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Vitest 커버리지 산출물 (npm run test:run -- --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# 제외
sonar.exclusions=\
    **/node_modules/**,\
    **/dist/**,\
    **/coverage/**,\
    **/*.config.ts,\
    **/*.config.js

# Quality Gate 대기
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
