# =============================================================================
# Backend SonarQube 프로젝트 설정 — TK-32-2-2
# =============================================================================
# Jenkinsfile.backend 의 'SonarQube Analysis' stage 에서 './gradlew sonar' 실행 시 참조.
# Quality Gate 'Scheduling' 적용 (bootstrap-quality-gate.sh 로 생성).
# =============================================================================

sonar.projectKey=scheduling-backend
sonar.projectName=Scheduling Backend
sonar.projectVersion=0.1.0-SNAPSHOT

# 7 modulith 모듈 + app 합성
sonar.sources=\
    app/src/main,\
    common/src/main,\
    order/src/main,\
    vc/src/main,\
    ex/src/main,\
    master/src/main,\
    audit/src/main,\
    notify/src/main

sonar.tests=\
    app/src/test,\
    common/src/test,\
    order/src/test,\
    vc/src/test,\
    ex/src/test,\
    master/src/test,\
    audit/src/test,\
    notify/src/test

# Gradle 빌드 산출물 위치
sonar.java.binaries=**/build/classes/java/main
sonar.java.libraries=**/build/libs/*.jar
sonar.java.source=21
sonar.java.target=21

# Jacoco 커버리지 (jacocoTestReport task 결과)
sonar.coverage.jacoco.xmlReportPaths=\
    app/build/reports/jacoco/test/jacocoTestReport.xml,\
    common/build/reports/jacoco/test/jacocoTestReport.xml,\
    order/build/reports/jacoco/test/jacocoTestReport.xml,\
    vc/build/reports/jacoco/test/jacocoTestReport.xml,\
    ex/build/reports/jacoco/test/jacocoTestReport.xml,\
    master/build/reports/jacoco/test/jacocoTestReport.xml,\
    audit/build/reports/jacoco/test/jacocoTestReport.xml,\
    notify/build/reports/jacoco/test/jacocoTestReport.xml

# JUnit 테스트 결과
sonar.junit.reportPaths=**/build/test-results/test

# 제외 — 자동 생성 / 빌드 산출물 / QueryDSL
sonar.exclusions=**/build/**,**/generated/**,**/Q*.java,**/*Application.java

# Quality Gate 완료까지 대기 (Jenkinsfile 의 waitForQualityGate 에서 검사)
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
