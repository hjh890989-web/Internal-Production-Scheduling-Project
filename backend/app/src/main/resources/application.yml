# =============================================================================
# application.yml — 메인 entrypoint 설정
# =============================================================================
# 본 Task (TK-00-2-1) 단계 — Datasource·Redis·Flyway 설정은 모두 환경 변수로 외부화.
# 환경 변수 미설정 시 부팅 가능하도록 datasource/Redis는 'optional' 처리 (Sprint 1+ Task로 활성).
# =============================================================================

spring:
  application:
    name: scheduling

  # TK-01-1-1 multipart 한도 (3 워크북 × 20MB)
  servlet:
    multipart:
      max-file-size: 20MB               # 단일 파일
      max-request-size: 60MB            # 3 파일 동시

  # KST 통일 (BR-X04) — JSON serialize / deserialize 시 Asia/Seoul 강제
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX
    default-property-inclusion: non_null

  # JPA/SQL auto-config — Sprint 1 PG Task 전에는 비활성 (with-infra profile 로 활성).
  # Redis = TK-01-1-3 ImportTrackingService 가 StringRedisTemplate 필요 — bean 생성은 항상 OK
  # (실제 연결은 lazy — Redis 미가용 시 첫 호출에서 실패).
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: Asia/Seoul     # BR-X04

server:
  port: 8080
  forward-headers-strategy: framework   # NGINX X-Forwarded-Proto 인식

# TK-01-1-1 Excel parser 설정 (Apache POI streaming)
scheduling:
  excel:
    max-file-size-mb: 20                # REQ-FUNC-OC-001
    row-cache-size: 100                 # SXSSF buffer (≤256MB 보장)
    buffer-size-bytes: 4096
    timeout-seconds: 60                 # REQ-NF-PER-001

  # TK-03-2-3 Critical 분류 임계치 (BR-O02 / REQ-FUNC-OC-008)
  severity:
    qty-change-threshold-pct: 0.20      # BR-O02 ±20%
    delivery-date-always-critical: true
    hose-id-always-critical: true
    new-always-critical: true
    deleted-always-critical: true

  # TK-03-3-1 알림 발송 (REQ-FUNC-OC-009)
  notification:
    app-url: ${APP_URL:https://schedule.intranet}
    default-target-role: PLANNER
    kakao:
      enabled: ${KAKAO_ENABLED:false}                 # Sprint 1 baseline 기본 비활성 (stub)
      webhook-url: ${KAKAO_WEBHOOK_URL:}
      bot-token: ${KAKAO_BOT_TOKEN:}
      timeout-seconds: 5
    in-app:
      topic-prefix: /topic/notifications

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: scheduling
      environment: ${SPRING_PROFILES_ACTIVE:dev}
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.scheduling: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

# =============================================================================
# Profile: 'with-infra' — Sprint 1 PG/Redis 연동 후 활성
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: with-infra

  autoconfigure:
    exclude: []     # auto-config 복원

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:scheduling}
    username: ${POSTGRES_USER:app_user}
    password: ${POSTGRES_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      connection-init-sql: "SET TIME ZONE 'Asia/Seoul'"

  jpa:
    hibernate:
      ddl-auto: validate     # Flyway가 스키마 관리

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  flyway:
    enabled: true
    schemas: app,master,audit
    locations: classpath:db/migration
